  // ---- Image Compression Utility ----
  function compressImage(file, maxWidth = 800, maxHeight = 800, quality = 0.6) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;
          
          // Calculate new dimensions
          if (width > height) {
            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }
          } else {
            if (height > maxHeight) {
              width = Math.round((width * maxHeight) / height);
              height = maxHeight;
            }
          }
          
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          // Convert to base64 with compression
          const base64 = canvas.toDataURL('image/jpeg', quality);
          resolve(base64);
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function previewImage(file, containerId) {
    const container = document.getElementById(containerId);
    if (!file) {
      container.innerHTML = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      container.innerHTML = `<img src="${e.target.result}" class="image-thumb" alt="Preview">`;
    };
    reader.readAsDataURL(file);
  }

  async function addTaskForTomorrow() {
    const desc = document.getElementById('taskDesc').value.trim();
    const time = document.getElementById('taskDeadline').value;
    if (!desc || !time) return alert("Please enter task and deadline");
    
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    const targetDate = tomorrow.toISOString().split('T')[0];
    
    const task = {
      description: desc,
      deadline: `${targetDate}T${time}:00`,
      status: 'pending',
      completedAt: null,
      createdAt: new Date().toISOString(),
      date: targetDate
    };
    
    await db.collection('tasks').add(task);
    alert(`Task added for ${targetDate}!`);
    document.getElementById('taskDesc').value = '';
    document.getElementById('taskDeadline').value = '';
  }

  async function loadTodayTasks() {
    const today = getTodayStr();
    const snapshot = await db.collection('tasks')
      .where('date', '==', today)
      .orderBy('deadline')
      .get();
    
    const container = document.getElementById('todayTasksList');
    if (snapshot.empty) {
      container.innerHTML = '<p style="color:#64748b;">No tasks for today. Add tasks for tomorrow!</p>';
      return;
    }
    
    let html = '';
    snapshot.forEach(doc => {
      const t = doc.data();
      const locked = isLocked(t.date);
      const timeDisplay = t.deadline ? t.deadline.split('T')[1]?.substring(0,5) : '';
      
      html += `
        <div class="task-item">
          <div style="flex:1;">
            <strong>${t.description}</strong><br>
            <small>⏰ ${timeDisplay}</small>
            ${t.completedAt ? `<br><small style="color:#16a34a;">✅ ${new Date(t.completedAt).toLocaleTimeString()}</small>` : ''}
          </div>
          <div>
            ${t.status === 'done' ? '✅' : 
              (locked ? '<span class="deadline-lock">Locked</span>' : 
              `<button class="btn-tiny btn markDoneBtn" data-id="${doc.id}">Done</button>`)}
          </div>
        </div>`;
    });
    
    container.innerHTML = html;
    
    document.querySelectorAll('.markDoneBtn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const id = e.target.dataset.id;
        await db.collection('tasks').doc(id).update({
          status: 'done',
          completedAt: new Date().toISOString()
        });
        loadTodayTasks();
        // Also refresh mentor view if open
      });
    });
  }

  function isLocked(dateStr) {
    const now = new Date();
    const targetDay = new Date(dateStr + 'T00:01:00');
    return now >= targetDay;
  }

  async function saveDailyStats() {
    const today = getTodayStr();
    const statusEl = document.getElementById('saveStatus');
    statusEl.textContent = 'Saving...';
    
    const chapters = document.getElementById('chaptersCompleted').value || 0;
    const revision = document.getElementById('revisionDone').value || 0;
    const score = document.getElementById('testScore').value || 0;
    const pyqs = document.getElementById('pyqsCompleted').value || 0;
    
    const screenFile = document.getElementById('screenTimeImg').files[0];
    const dayFile = document.getElementById('dayPicture').files[0];
    
    const data = {
      chaptersCompleted: Number(chapters),
      revisionDone: Number(revision),
      testScore: Number(score),
      pyqsCompleted: Number(pyqs),
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    };
    
    try {
      // Compress and convert images to base64
      if (screenFile) {
        statusEl.textContent = 'Compressing screen time image...';
        data.screenTimeImage = await compressImage(screenFile, 600, 600, 0.5);
        data.screenTimeImageName = screenFile.name;
      }
      
      if (dayFile) {
        statusEl.textContent = 'Compressing day picture...';
        data.dayPicture = await compressImage(dayFile, 600, 600, 0.5);
        data.dayPictureName = dayFile.name;
      }
      
      await db.collection('dailyStats').doc(today).set(data, { merge: true });
      statusEl.textContent = '✅ Saved successfully!';
      setTimeout(() => { statusEl.textContent = ''; }, 3000);
      
      // Clear file inputs
      document.getElementById('screenTimeImg').value = '';
      document.getElementById('dayPicture').value = '';
      document.getElementById('screenPreview').innerHTML = '';
      document.getElementById('dayPreview').innerHTML = '';
      
    } catch (error) {
      statusEl.textContent = '❌ Error: ' + error.message;
      statusEl.style.color = '#dc2626';
    }
  }

  async function loadPastDayDetail(date) {
    const container = document.getElementById('pastDayDetail');
    if (!date) { container.innerHTML = ''; return; }
    
    container.innerHTML = '<div class="loading-spinner"></div> Loading...';
    
    const doc = await db.collection('dailyStats').doc(date).get();
    if (!doc.exists) {
      container.innerHTML = '<p style="color:#64748b;">No data for this date.</p>';
      return;
    }
    
    const d = doc.data();
    container.innerHTML = `
      <div style="background:#f8fafc; padding:12px; border-radius:16px;">
        <p><strong>📚 Chapters:</strong> ${d.chaptersCompleted || 0}</p>
        <p><strong>🔄 Revisions:</strong> ${d.revisionDone || 0}</p>
        <p><strong>📝 Test Score:</strong> ${d.testScore || 0}</p>
        <p><strong>📄 PYQs:</strong> ${d.pyqsCompleted || 0}</p>
        ${d.screenTimeImage ? `
          <div style="margin-top:8px;">
            <strong>📱 Screen Time:</strong><br>
            <img src="${d.screenTimeImage}" class="image-thumb" onclick="showFullImage(this.src)" style="cursor:pointer;">
          </div>` : ''}
        ${d.dayPicture ? `
          <div style="margin-top:8px;">
            <strong>📸 Day Picture:</strong><br>
            <img src="${d.dayPicture}" class="image-thumb" onclick="showFullImage(this.src)" style="cursor:pointer;">
          </div>` : ''}
        ${d.mentorFeedback ? `<div class="comment-box">💬 <strong>Mentor:</strong> ${d.mentorFeedback}</div>` : ''}
      </div>
    `;
  }

    let html = '';
    snapshot.forEach(doc => {
      const t = doc.data();
      const timeDisplay = t.deadline ? t.deadline.split('T')[1]?.substring(0,5) : '';
      html += `
        <div style="padding:8px 0; border-bottom:1px solid #f1f5f9;">
          ${t.status === 'done' ? '✅' : '⏳'} <strong>${t.description}</strong>
          <small>(${timeDisplay})</small>
          ${t.completedAt ? `<br><small style="color:#16a34a;">Completed: ${new Date(t.completedAt).toLocaleTimeString()}</small>` : ''}
        </div>`;
    });
    container.innerHTML = html;
  }

  async function loadMentorStatsForDate(date) {
    const div = document.getElementById('mentorStatsDisplay');
    if (!date) { div.innerHTML = 'Select a date'; return; }
    
    div.innerHTML = '<div class="loading-spinner"></div> Loading...';
    
    const doc = await db.collection('dailyStats').doc(date).get();
    if (!doc.exists) {
      div.innerHTML = '<p style="color:#64748b;">No data for this date.</p>';
      return;
    }
    
    const d = doc.data();
    div.innerHTML = `
      <div style="background:#f8fafc; padding:12px; border-radius:16px;">
        <p><strong>📚 Chapters:</strong> ${d.chaptersCompleted || 0}</p>
        <p><strong>🔄 Revisions:</strong> ${d.revisionDone || 0}</p>
        <p><strong>📝 Test Score:</strong> ${d.testScore || 0}</p>
        <p><strong>📄 PYQs:</strong> ${d.pyqsCompleted || 0}</p>
        ${d.screenTimeImage ? `
          <div style="margin-top:8px;">
            <strong>📱 Screen Time:</strong><br>
            <img src="${d.screenTimeImage}" class="image-thumb" onclick="showFullImage(this.src)" style="cursor:pointer;">
          </div>` : ''}
        ${d.dayPicture ? `
          <div style="margin-top:8px;">
            <strong>📸 Day Picture:</strong><br>
            <img src="${d.dayPicture}" class="image-thumb" onclick="showFullImage(this.src)" style="cursor:pointer;">
          </div>` : ''}
        ${d.mentorFeedback ? `<div class="comment-box">💬 <strong>Previous Feedback:</strong> ${d.mentorFeedback}</div>` : ''}
      </div>
    `;
  }

  async function submitFeedback() {
    const feedback = document.getElementById('mentorFeedback').value.trim();
    const statusEl = document.getElementById('feedbackStatus');
    
    if (!feedback) {
      statusEl.textContent = 'Please write feedback.';
      statusEl.style.color = '#dc2626';
      return;
    }
    
    const today = getTodayStr();
    await db.collection('dailyStats').doc(today).set({
      mentorFeedback: feedback,
      feedbackTimestamp: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
    
    statusEl.textContent = '✅ Feedback sent!';
    statusEl.style.color = '#16a34a';
    document.getElementById('mentorFeedback').value = '';
    setTimeout(() => { statusEl.textContent = ''; }, 3000);
  }

  // ---- Image Modal ----
  window.showFullImage = function(src) {
    document.getElementById('modalImage').src = src;
    document.getElementById('imageModal').style.display = 'flex';
  };

  // ---- Auth State Handler ----
  auth.onAuthStateChanged(async (user) => {
    if (!user) {
      currentUser = null;
      userRole = null;
      renderLogin();
      return;
    }
    
    currentUser = user;
    userRole = (user.email === STUDENT_EMAIL) ? 'student' : 'mentor';
    
    if (userRole === 'student') {
      renderStudentDashboard();
    } else {
      renderMentorDashboard();
    }
  });
</script>
</body>
</html>
